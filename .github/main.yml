name: GitHub Actions Demo

on:
  push:
    branches:
      - main

jobs:
  hello-world:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print a message
        run: echo "Hello from GitHub Actions!"

      - name: Show current directory
        run: pwd

      - name: List files
        run: ls -la